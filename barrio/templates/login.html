{% extends "inicio.html" %}
{% block content %}


<h2>Ingresar al sistema del barrio</h2>

<form method="POST">
    {% csrf_token %}
    
    <input type="text" name="codigo" placeholder="Código de 4 dígitos" maxlength="4" required>

    <button type="submit">Entrar</button>
</form>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

{% endblock %}
